<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CRUX 工作室 — 图形驾驶舱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e2e;color:#cdd6f4;font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:280px;background:#181825;padding:20px;display:flex;flex-direction:column;border-right:1px solid #313244;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column}
#header{background:#181825;padding:14px 20px;border-bottom:1px solid #313244;display:flex;align-items:center;gap:14px}
#messages{flex:1;overflow-y:auto;padding:16px 20px}
#input-bar{padding:14px 20px;background:#181825;border-top:1px solid #313244;display:flex;gap:8px}
.side-section{margin-bottom:18px}
.side-title{font-size:11px;text-transform:uppercase;color:#585b70;font-weight:700;margin-bottom:8px;letter-spacing:.5px}
.side-item{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.side-item .label{color:#a6adc8}
.side-item .value{color:#cdd6f4;font-weight:500;text-align:right}
.side-item .ok{color:#a6e3a1}
.side-item .warn{color:#fab387}
.side-item .error{color:#f38ba8}
.msg{padding:10px 14px;margin-bottom:8px;border-radius:8px;line-height:1.5;font-size:14px;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#313244;border-left:3px solid #f2cdcd}
.msg.assistant{background:#1e1e2e;border-left:3px solid #89b4fa}
.msg.system{background:#1e1e2e;border-left:3px solid #fab387;font-size:12px;color:#a6adc8}
.msg.error{background:#1e1e2e;border-left:3px solid #f38ba8;color:#f38ba8}
.msg .role{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:4px;display:block}
.msg.user .role{color:#f2cdcd}
.msg.assistant .role{color:#89b4fa}
.msg pre{background:#11111b;padding:8px 12px;border-radius:6px;overflow-x:auto;font-size:13px;margin:6px 0}
.msg code{background:#11111b;padding:2px 5px;border-radius:3px;font-size:13px}
.msg b{color:#cba6f7}
#input{flex:1;background:#313244;border:1px solid #45475a;border-radius:6px;padding:8px 14px;color:#cdd6f4;font-size:14px;outline:none}
#input:focus{border-color:#89b4fa}
#send-btn{background:#89b4fa;color:#1e1e2e;border:none;border-radius:6px;padding:8px 22px;font-weight:600;cursor:pointer;font-size:14px}
#send-btn:hover{background:#74c7ec}
#conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
#conn-dot.on{background:#a6e3a1;box-shadow:0 0 6px #a6e3a1}
#conn-dot.off{background:#f38ba8}
#model-badge{background:#313244;padding:3px 12px;border-radius:10px;font-size:12px;color:#89b4fa;font-weight:500}
#ctx-bar{flex:1;height:6px;background:#313244;border-radius:3px;max-width:200px;overflow:hidden}
#ctx-fill{height:100%;background:#89b4fa;border-radius:3px;transition:width .5s}
#ctx-fill.warn{background:#fab387}
#ctx-fill.crit{background:#f38ba8}
</style>
</head>
<body>

<div id="sidebar">
  <div style="font-size:20px;font-weight:700;margin-bottom:24px;color:#89b4fa">🐉 CRUX 工作室</div>
  <div class="side-section">
    <div class="side-title">状态</div>
    <div class="side-item"><span class="label">模型</span><span class="value" id="s-model">—</span></div>
    <div class="side-item"><span class="label">Agent</span><span class="value" id="s-agents">0</span></div>
    <div class="side-item"><span class="label">上下文</span><span class="value" id="s-ctx">0%</span></div>
    <div class="side-item"><span class="label">工具</span><span class="value" id="s-tool">空闲</span></div>
  </div>
  <div class="side-section">
    <div class="side-title">ComfyUI</div>
    <div class="side-item"><span class="label">状态</span><span class="value" id="s-comfy">未知</span></div>
    <div class="side-item"><span class="label">队列</span><span class="value" id="s-queue">0</span></div>
  </div>
  <div class="side-section" id="sys-panel" style="display:none">
    <div class="side-title">系统</div>
    <div class="side-item"><span class="label">CPU</span><span class="value" id="s-cpu">0%</span></div>
    <div class="side-item"><span class="label">内存</span><span class="value" id="s-mem">0%</span></div>
    <div class="side-item"><span class="label">磁盘</span><span class="value" id="s-disk">0%</span></div>
  </div>
  <div style="margin-top:auto;font-size:11px;color:#585b70">
    事件数: <span id="evt-count">0</span> | v2.0
  </div>
</div>

<div id="main">
  <div id="header">
    <span id="conn-dot" class="off"></span>
    <span style="font-size:12px;color:#a6adc8" id="conn-text">● 未连接</span>
    <span id="model-badge">—</span>
    <div id="ctx-bar"><div id="ctx-fill" style="width:0%"></div></div>
  </div>
  <div id="messages">
    <div class="msg system">
      <span class="role">[系统]</span>
      CRUX 工作室 — 图形驾驶舱<br>
      双形态 TUI+GUI 架构已就绪。
    </div>
  </div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="输入消息或 /命令..." />
    <button id="send-btn">发送</button>
  </div>
</div>

<script>
'use strict';
var ws = null;
var evtCount = 0;
var msgEl = document.getElementById('messages');
var retryTimer = null;
var WS_PORT = location.port ? parseInt(location.port) + 1 : 9734;

function connect() {
  var url = 'ws://' + location.hostname + ':' + WS_PORT;
  ws = new WebSocket(url);
  ws.onopen = function() {
    document.getElementById('conn-dot').className = 'on';
    document.getElementById('conn-text').textContent = '● 已连接';
    if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
  };
  ws.onclose = function(evt) {
    document.getElementById('conn-dot').className = 'off';
    document.getElementById('conn-text').textContent = '● 未连接 (' + evt.code + ')';
    if (!retryTimer) { retryTimer = setInterval(connect, 2000); }
  };
  ws.onerror = function() {
    document.getElementById('conn-dot').className = 'off';
    document.getElementById('conn-text').textContent = '● 连接失败';
  };
  ws.onmessage = function(e) {
    evtCount++;
    document.getElementById('evt-count').textContent = evtCount;
    try {
      handleEvent(JSON.parse(e.data));
    } catch(err) {
      addMessage('assistant', e.data);
    }
  };
}

function handleEvent(msg) {
  var type = msg.type || '';
  if (type === 'state.snapshot' || type === 'dashboard.update') {
    renderState(msg.data || msg);
  } else if (type === 'message.received') {
    addMessage((msg.data||msg).role || 'assistant', (msg.data||msg).content || '');
  } else if (type === 'message.sent') {
    if (msg.source && msg.source !== 'gui') {
      addMessage((msg.data||msg).role || 'user', (msg.data||msg).content || '');
    }
  } else if (type === 'system.metrics') {
    renderSystemMetrics(msg.data || msg);
  } else if (type === 'error.occurred') {
    var d = msg.data || msg;
    addMessage('error', d.message || d.error_msg || '未知错误');
  }
}

function renderState(state) {
  if (state.model) {
    document.getElementById('model-badge').textContent = state.model;
    document.getElementById('s-model').textContent = state.model;
  }
  document.getElementById('s-agents').textContent = state.active_agents != null ? state.active_agents : 0;
  var ctx = Math.round(state.context_pct || 0);
  var ctxEl = document.getElementById('s-ctx');
  ctxEl.textContent = ctx + '%';
  ctxEl.className = 'value' + (ctx > 85 ? ' error' : ctx > 65 ? ' warn' : ' ok');
  var tool = state.tool_status || 'idle';
  document.getElementById('s-tool').textContent = tool === 'idle' ? '空闲' : tool === 'executing' ? '执行中' : tool === 'streaming' ? '输出中' : tool;
  document.getElementById('s-tool').className = 'value' + (tool === 'error' ? ' error' : '');
  document.getElementById('s-comfy').textContent = state.comfyui_online ? '在线' : '离线';
  document.getElementById('s-comfy').className = 'value' + (state.comfyui_online ? ' ok' : '');
  document.getElementById('s-queue').textContent = state.comfyui_queue || 0;
  var fill = document.getElementById('ctx-fill');
  fill.style.width = Math.min(100, ctx) + '%';
  fill.className = ctx > 85 ? 'crit' : ctx > 65 ? 'warn' : '';
}

function renderSystemMetrics(data) {
  document.getElementById('sys-panel').style.display = 'block';
  document.getElementById('s-cpu').textContent = Math.round(data.cpu_pct || 0) + '%';
  document.getElementById('s-mem').textContent = Math.round(data.memory_pct || 0) + '%';
  document.getElementById('s-disk').textContent = Math.round(data.disk_pct || 0) + '%';
}

function addMessage(role, content) {
  if (!content) return;
  var div = document.createElement('div');
  div.className = 'msg ' + (role || 'system');
  var labels = {user:'用户', assistant:'助手', system:'系统', error:'错误'};
  var label = labels[role] || role;
  var text = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/\n/g,'<br>');
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,l,code){return '<pre><code>'+code+'</code></pre>';});
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  text = text.replace(/\*([^*]+)\*/g, '<i>$1</i>');
  div.innerHTML = '<span class="role">[' + label + ']</span>' + text;
  msgEl.appendChild(div);
  msgEl.scrollTop = msgEl.scrollHeight;
}

document.getElementById('send-btn').onclick = send;
document.getElementById('input').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
};

function send() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (text.startsWith('/')) { handleCmd(text); }
  else {
    addMessage('user', text);
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({type:'chat.input', data:{content:text, role:'user'}}));
    }
  }
}

function handleCmd(cmd) {
  var op = cmd.split(/\s+/)[0].toLowerCase();
  if (op === '/clear') { msgEl.innerHTML = ''; addMessage('system', '消息已清除。'); }
  else if (op === '/help') { addMessage('system', '命令列表：\n/clear — 清除消息\n/help — 显示帮助\n/sys — 系统指标面板'); }
  else if (op === '/sys') {
    var p = document.getElementById('sys-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
  else { addMessage('system', '未知命令: ' + cmd); }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'chat.input', data:{content:cmd, role:'user'}}));
  }
}

connect();
</script>
</body>
</html>
