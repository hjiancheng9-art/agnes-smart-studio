version: 1
root: "."

# ── Protected paths (T0): 绝对保留，永不自动删除 ──
protected:
  paths:
    - "core/**"
    - "ui/**"
    - "agents/**"
    - "tools/**"
    - "skills/**"
    - "tests/**"
    - "docs/**"
    - "methodologies/**"
    - "templates/**"
    - "workflow_templates/**"
    - "config/**"
    - "pyproject.toml"
    - "requirements*.txt"
    - "uv.lock"
    - "poetry.lock"
    - ".env"
    - ".env.example"
    - "AGENTS.md"
    - "AGENTS_REF.md"
    - "CHANGELOG.md"
    - "CLAUDE.md"
    - "README.md"
    - "LICENSE"
    - ".git/**"
    - ".crux/cleanup/**"
    - ".crux/backups/**"
    - ".crux/wiki/**"
    - ".crux_memory/**"
    - "apps/**"
    - "awareness/**"
    - "reference/**"
    - "feedback.json"
    - "*_start.bat"
    - "*_start.sh"

  extensions:
    - ".py"
    - ".md"
    - ".toml"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".css"
    - ".html"

# ── Cleanup rules ──
cleanup_rules:
  # ── T4: 临时垃圾，可安全自动清理 ──
  python_cache:
    patterns:
      - "**/__pycache__/**"
      - "**/*.pyc"
      - "**/*.pyo"
      - ".pytest_cache/**"
      - ".mypy_cache/**"
      - ".ruff_cache/**"
      - "**/*.egg-info/**"
      - ".tox/**"
      - "dist/**"
      - "build/**"
    action: "trash"
    min_age_days: 0
    risk: "low"
    description: "Python 缓存和构建产物"

  temp_files:
    patterns:
      - "**/*.tmp"
      - "**/*.bak"
      - "**/*.old"
      - "**/*.orig"
      - "**/*.swp"
      - "**/*.swo"
      - "**/Thumbs.db"
      - "**/.DS_Store"
      - "**/desktop.ini"
      - "**/~$*"
      - ".crux/tmp/**"
    action: "trash"
    min_age_days: 1
    risk: "low"
    description: "临时文件和系统垃圾"

  node_cache:
    patterns:
      - "**/node_modules/**"
      - "**/.npm/**"
    action: "review"
    min_age_days: 7
    risk: "medium"
    description: "Node.js 依赖缓存（可能需要重新 npm install）"

  # ── T3: 缓存/中间产物 ──
  browser_screenshots:
    patterns:
      - "output/screenshot_*.png"
      - "output/browser_*.png"
      - "output/chatgpt_*.png"
    action: "trash"
    min_age_days: 3
    risk: "low"
    description: "浏览器截图"

  generated_output:
    patterns:
      - "output/*.html"
      - "output/*.pdf"
      - "output/reply_section_*.txt"
      - "output/_cmd_*.py"
      - "output/_nested/**"
      - "output/.edge_svc/**"
    action: "trash"
    min_age_days: 7
    risk: "low"
    description: "生成输出文件"

  log_files:
    patterns:
      - "**/*.log"
      - "**/*.log.*"
      - ".crux/logs/**"
    action: "trash"
    min_age_days: 14
    risk: "low"
    description: "日志文件"

  # ── T1: 可重新生成的输出 ──
  comfyui_output:
    patterns:
      - "output/ComfyUI_*.png"
      - "output/ComfyUI_*.json"
      - "comfyui_output/**/*.png"
    action: "trash"
    min_age_days: 14
    risk: "low"
    description: "ComfyUI 生成输出"

  # ── 新增: 处理之前未归类的文件 ──
  chrome_profile:
    patterns:
      - "temp_chrome_profile/**"
    action: "trash"
    min_age_days: 0
    risk: "low"
    description: "Chrome 临时浏览器配置缓存"

  generated_videos:
    patterns:
      - "output/**/*.mp4"
      - "output/**/*.webm"
      - "output/**/*.avi"
      - "output/**/*.mov"
    action: "trash"
    min_age_days: 7
    risk: "low"
    description: "生成的视频文件"

  generated_images:
    patterns:
      - "output/**/*.jpg"
      - "output/**/*.jpeg"
      - "output/**/*.gif"
      - "output/**/*.webp"
      - "output/**/*.bmp"
      - "output/**/*.svg"
    action: "trash"
    min_age_days: 7
    risk: "low"
    description: "生成的图片（非截图）"

  generated_png_output:
    patterns:
      - "output/**/*.png"
    action: "trash"
    min_age_days: 3
    risk: "low"
    description: "PNG 图像（已排除截图规则匹配的）"
    # 注意: browser_screenshots 规则优先级更高，会先匹配

  generated_data:
    patterns:
      - "output/**/*.json"
      - "output/**/*.jsonl"
      - "output/**/*.txt"
      - "output/**/*.csv"
      - "output/**/*.xml"
      - "output/**/*.yaml"
      - "output/**/*.yml"
      - "output/**/*.wav"
      - "output/**/*.aac"
      - "output/**/*.flac"
      - "output/**/*.ogg"
    action: "trash"
    min_age_days: 14
    risk: "low"
    description: "生成的数据文件（JSON/JSONL/TXT 等，14天以上可清理）"

  crux_cache:
    patterns:
      - ".crux/cache/**"
      - ".crux/tmp/**"
      - ".crux/browser/**"
    action: "trash"
    min_age_days: 7
    risk: "low"
    description: "CRUX 内部缓存"

  reference_temp:
    patterns:
      - "reference/**/*.bak"
      - "reference/**/*.old"
      - "reference/**/*.tmp"
    action: "trash"
    min_age_days: 0
    risk: "low"
    description: "reference 下的临时文件"



# ── Trash settings ──
trash:
  location: ".crux/trash/"
  retention_days: 7
  auto_delete_after_retention: true

# ── Schedule ──
schedule:
  auto_scan_on_startup: true
  prompt_before_delete: true
  max_files_per_run: 500

# ── Notifications ──
notifications:
  dry_run_summary: true
  delete_summary: true
  large_cleanup_threshold_mb: 100
