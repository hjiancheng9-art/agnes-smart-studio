<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes 多模态工作室 v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app">

  <!-- 顶部 -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">🔥</span>
      <h1>Agnes 多模态工作室 <small>v2.0</small></h1>
    </div>
    <div class="header-right">
      <div id="key-status" class="key-badge" title="API Key 状态">🔑 未配置</div>
      <button id="btn-key" class="btn btn-sm" onclick="showKeyDialog()">设置 Key</button>
    </div>
  </header>

  <!-- 标签栏 -->
  <nav class="tabs">
    <button class="tab active" data-tab="image">🖼️ 图片生成</button>
    <button class="tab" data-tab="video">🎬 视频生成</button>
    <button class="tab" data-tab="query">🔍 视频查询</button>
  </nav>

  <!-- ======== 图片面板 ======== -->
  <section id="panel-image" class="panel active">
    <div class="panel-grid">
      <div class="panel-left">
        <!-- 模式切换 -->
        <div class="field">
          <label>生成模式</label>
          <div class="mode-switch">
            <button class="mode-btn active" data-mode="t2i">📝 文生图</button>
            <button class="mode-btn" data-mode="i2i">🖼️ 图生图</button>
          </div>
        </div>

        <!-- 提示词 -->
        <div class="field">
          <label for="img-prompt">提示词 <span class="required">*</span></label>
          <textarea id="img-prompt" rows="3" placeholder="描述你想要生成的图片..."></textarea>
        </div>

        <!-- 参考图 (图生图) -->
        <div id="img-ref-row" class="field hidden">
          <label for="img-ref">参考图 URL</label>
          <input id="img-ref" type="text" placeholder="https://...">
        </div>

        <!-- 尺寸 -->
        <div class="field">
          <label>图片尺寸</label>
          <div class="row">
            <select id="img-size-preset" onchange="onImageSizePreset()">
            </select>
            <span class="sep">或</span>
            <input id="img-width" type="number" value="1024" min="256" max="2048" step="64" class="num-sm" title="宽度">
            <span>×</span>
            <input id="img-height" type="number" value="1024" min="256" max="2048" step="64" class="num-sm" title="高度">
          </div>
        </div>

        <!-- 品质 & 风格 -->
        <div class="field-row">
          <div class="field">
            <label>品质</label>
            <select id="img-quality">
              <option value="standard">Standard</option>
              <option value="hd">HD</option>
            </select>
          </div>
          <div class="field">
            <label>风格</label>
            <select id="img-style">
              <option value="vivid">Vivid (生动)</option>
              <option value="natural">Natural (自然)</option>
            </select>
          </div>
          <div class="field">
            <label>数量</label>
            <input id="img-num" type="number" value="1" min="1" max="4" class="num-sm">
          </div>
        </div>

        <!-- Seed -->
        <div class="field">
          <label>随机种子 (可选)</label>
          <input id="img-seed" type="number" placeholder="留空则随机">
        </div>

        <button id="btn-img-generate" class="btn btn-primary btn-lg" onclick="generateImage()">
          🚀 生成图片
        </button>
      </div>

      <div class="panel-right">
        <div id="img-result" class="result-area">
          <div class="placeholder">等待生成…</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ======== 视频面板 ======== -->
  <section id="panel-video" class="panel">
    <div class="panel-grid">
      <div class="panel-left">
        <!-- 模式 -->
        <div class="field">
          <label>生成模式</label>
          <div class="mode-switch">
            <button class="mode-btn active" data-mode="t2v">📝 文生视频</button>
            <button class="mode-btn" data-mode="i2v">🖼️ 图生视频</button>
          </div>
        </div>

        <!-- 提示词 -->
        <div class="field">
          <label for="vid-prompt">提示词 <span class="required">*</span></label>
          <textarea id="vid-prompt" rows="3" placeholder="描述你想要生成的视频..."></textarea>
        </div>

        <!-- 参考图 -->
        <div id="vid-ref-row" class="field hidden">
          <label for="vid-ref">参考图 URL</label>
          <input id="vid-ref" type="text" placeholder="https://...">
        </div>

        <!-- 模型 -->
        <div class="field">
          <label>视频模型</label>
          <select id="vid-model"></select>
        </div>

        <!-- 分辨率 -->
        <div class="field">
          <label>分辨率</label>
          <select id="vid-resolution" onchange="onVideoResolution()"></select>
          <div class="row" style="margin-top:6px">
            <input id="vid-width" type="number" value="1280" min="480" max="1920" step="16" class="num-sm" title="宽度">
            <span>×</span>
            <input id="vid-height" type="number" value="720" min="480" max="1920" step="16" class="num-sm" title="高度">
          </div>
        </div>

        <!-- 时长 + FPS -->
        <div class="field-row">
          <div class="field">
            <label>时长 (秒)</label>
            <input id="vid-duration" type="range" min="3" max="60" value="5" step="1" oninput="document.getElementById('vid-dur-val').textContent=this.value+'s'">
            <span id="vid-dur-val" class="range-val">5s</span>
          </div>
          <div class="field">
            <label>帧率</label>
            <select id="vid-fps">
              <option value="16">16 fps</option>
              <option value="24" selected>24 fps</option>
              <option value="30">30 fps</option>
              <option value="60">60 fps</option>
            </select>
          </div>
        </div>

        <!-- 反向提示词 -->
        <div class="field">
          <label>反向提示词 (可选)</label>
          <input id="vid-neg" type="text" placeholder="不希望出现的内容...">
        </div>

        <!-- Seed -->
        <div class="field">
          <label>随机种子 (可选)</label>
          <input id="vid-seed" type="number" placeholder="留空则随机">
        </div>

        <button id="btn-vid-generate" class="btn btn-primary btn-lg" onclick="generateVideo()">
          🎥 生成视频
        </button>
      </div>

      <div class="panel-right">
        <div id="vid-result" class="result-area">
          <div class="placeholder">等待生成…</div>
        </div>
        <!-- 轮询进度 -->
        <div id="vid-poll" class="poll-status hidden"></div>
      </div>
    </div>
  </section>

  <!-- ======== 查询面板 ======== -->
  <section id="panel-query" class="panel">
    <div class="query-box">
      <h2>🔍 按 Video ID 查询</h2>
      <div class="field">
        <label for="query-id">Video ID</label>
        <div class="row">
          <input id="query-id" type="text" placeholder="输入 video_id..." class="input-lg">
          <button class="btn btn-primary" onclick="queryVideo()">查询</button>
          <button class="btn btn-outline" onclick="queryAndWait()">查询并等待完成</button>
        </div>
      </div>
      <div id="query-result" class="result-area" style="margin-top:16px">
        <div class="placeholder">输入 video_id 查询状态</div>
      </div>
    </div>
  </section>

</div>

<!-- API Key 弹窗 -->
<div id="key-dialog" class="dialog-overlay hidden">
  <div class="dialog">
    <h3>设置 Agnes API Key</h3>
    <input id="key-input" type="password" placeholder="粘贴你的 API Key...">
    <div class="dialog-actions">
      <button class="btn btn-outline" onclick="closeKeyDialog()">取消</button>
      <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
