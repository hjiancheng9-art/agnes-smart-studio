[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agnes-smart-studio"
version = "2.0.0"
description = "Agnes AI 智能工作台 — 生图/生视频/聊天/编程/智能体/部署/项目管理"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "rich>=13",
    "Pillow>=10",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
]
authors = [{name = "Agnes Studio"}]
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
agnes = "agnes_studio:main"
agnes-chat = "agnes_studio:main_chat"
agnes-query = "agnes_studio:main_query"

[project.urls]
Homepage = "https://github.com/user/agnes-smart-studio"
