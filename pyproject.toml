[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crux-smart-studio"
version = "5.0.0"
description = "CRUX Studio — AI-native creative + coding platform · 75+ tools"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "rich>=13",
    "Pillow>=10",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "prompt_toolkit>=3.0",
    "nest_asyncio>=1.5",
    "playwright>=1.40",
    "edge-tts>=6.1",
]
authors = [{name = "CRUX Studio"}]
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
crux = "crux_studio:main"
crux-chat = "crux_studio:main_chat"
crux-query = "crux_studio:main_query"

# 扁平多包布局：显式声明只收代码包，避免 setuptools 自动发现把
# output/assets/skills 等非代码目录当成 Python 包（flat-layout 多包会直接报错）。
[tool.setuptools.packages.find]
include = ["core*", "ui*", "engines*", "pipeline*", "utils*"]

[tool.setuptools]
py-modules = ["crux_studio"]

[project.urls]
Homepage = "https://github.com/user/crux-smart-studio"

[tool.pytest.ini_options]
# 只收集 tests/ 顶层单元测试（mock，不打真实 API）。
# tests/manual/ 是手动集成脚本（打真实 API、有自己的入口），不纳入 CI 收集。
testpaths = ["tests"]
norecursedirs = ["tests/manual", "scripts", "output", ".codebuddy"]
python_files = ["test_*.py"]
addopts = "-q"

# pytest-asyncio 显式声明 strict 模式：仅 @pytest.mark.asyncio 标记的测试走
# asyncio 执行器。其余同步测试方法中的 async 协程必须自行用 asyncio.run()
# 驱动（见 test_async_chat / test_async_engines / test_showrunner / _multi_agent）。
# 显式声明避免未来 pytest-asyncio 版本改默认值（auto）时静默改变收集行为。
asyncio_mode = "strict"

[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = ["scripts/scratch", "tests/manual", "output", ".codebuddy", "models", "llama.cpp"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
]
ignore = [
    "E501",   # line-length 由 formatter / line-length 配置管理
    "E402",   # module-import-not-at-top（入口文件/条件 import 较多，per-file-ignores 已覆盖）
]

[tool.ruff.lint.per-file-ignores]
"crux_studio.py" = ["E402"]
"core/brain_data/__init__.py" = ["E402"]
"core/comfyui_tools.py" = ["E402"]
"core/web_api.py" = ["E402"]
"tests/*.py" = ["E402"]

[tool.pyright]
# 与 ruff extend-exexclude 保持一致：临时脚本/生成产物不纳入静态分析
exclude = ["scripts/scratch", "tests/manual", "output", ".codebuddy", "**/__pycache__"]
