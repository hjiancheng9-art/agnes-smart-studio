name: CRUX CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  RUFF_EXCLUDE: "_archive,node_modules,.git,.crux,stub_modules,_temp"

jobs:
  # ═══════════════════════════════════════════════════════════
  # Quick gate: runs on every push, blocks on failure
  # ═══════════════════════════════════════════════════════════
  quick:
    name: Quick Gate (lint + fast tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff pytest-timeout -r requirements.txt
      - name: Ruff lint
        run: ruff check --output-format=github . --exclude ${{ env.RUFF_EXCLUDE }}
      - name: Ruff format
        run: ruff format --check . --exclude ${{ env.RUFF_EXCLUDE }}
      - name: Fast unit tests
        run: |
          python -m pytest tests/ -q --tb=short \
            -m "not slow and not browser and not network and not mcp and not lsp and not github and not e2e" \
            --timeout=20 -p no:xdist
      - name: Quick mojibake check (changed files)
        run: |
          python core/pre_commit.py . 2>/dev/null || echo "Quality gates check completed"

  # ═══════════════════════════════════════════════════════════
  # Type check (hard gate — must pass)
  # ═══════════════════════════════════════════════════════════
  typecheck:
    name: Type Check (pyright incremental)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pyright -r requirements.txt
      - name: Pyright incremental (hard gate — new errors only)
        run: python scripts/check_pyright_incremental.py || (echo "::error::New type errors introduced — fix before merging" && exit 1)

  # ═══════════════════════════════════════════════════════════
  # Full test matrix: Ubuntu + Windows, Python 3.11 + 3.12
  # ═══════════════════════════════════════════════════════════
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install pytest-timeout pytest-cov -r requirements.txt
      - name: Unit tests
        run: |
          python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/self_audit \
            --ignore=tests/manual \
            --ignore=tests/test_agent_mode.py \
            -m "not slow and not browser and not network and not mcp and not lsp and not github and not e2e" \
            --timeout=30 \
            -p no:xdist
      - name: Coverage (core only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: |
          python -m pytest tests/ --cov=core --cov-report=term --cov-report=xml \
            --tb=short -q \
            --ignore=tests/self_audit \
            --ignore=tests/manual \
            --ignore=tests/test_agent_mode.py \
            -m "not slow and not browser and not network and not mcp and not lsp and not github and not e2e" \
            --timeout=30 -p no:xdist

  # ═══════════════════════════════════════════════════════════
  # Integration & stress tests (dedicated job, longer timeout)
  # ═══════════════════════════════════════════════════════════
  integration:
    name: Integration + Stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pytest-timeout -r requirements.txt
      - name: Integration E2E
        run: python -m pytest tests/test_integration_e2e.py -v --tb=short --timeout=30
      - name: Stress concurrency
        run: python -m pytest tests/test_stress_concurrency.py -v --tb=short --timeout=60

  # ═══════════════════════════════════════════════════════════
  # Security + encoding scan (hard gates)
  # ═══════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Bandit security check (hard gate)
        run: bandit -r core/ -f json -o bandit_report.json --skip B101,B311
      - name: pip-audit dependency scan (advisory)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit || echo "::warning::Dependency vulnerabilities found — review and update"

  # ═══════════════════════════════════════════════════════════
  # Encoding gate — mojibake scan (hard gate, zero tolerance)
  # ═══════════════════════════════════════════════════════════
  encoding:
    name: Encoding Gate (mojibake scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Mojibake scan (all files, hard gate)
        run: |
          python -c "
          import os, sys
          chars = set('鍥閸鐢纴鏉悆殑掑曠')
          EXCLUDE_FILES = {
              'core/encoding_fix.py',      # mojibake detection engine (signature chars by design)
              'core/pre_commit.py',        # quality gates (signature chars by design)
              'tests/test_encoding_fix.py', # encoding fix test data
          }
          EXCLUDE_DIRS = {'.git','__pycache__','node_modules','output','.codebuddy','.hypothesis','scripts/scratch','_archive','stub_modules'}
          EXCLUDE_PREFIXES = ('apps/nsp-downloader-legacy/scripts/scan-garbled',)
          hits = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS]
              for f in files:
                  if f.endswith(('.py','.js','.ts','.html','.css','.json','.md','.bat','.sh')):
                      rp = os.path.join(root, f).replace('\\\\', '/')
                      if rp.startswith('./'): rp = rp[2:]
                      if rp in EXCLUDE_FILES or any(rp.startswith(p) for p in EXCLUDE_PREFIXES):
                          continue
                      try:
                          content = open(os.path.join(root,f), encoding='utf-8').read()
                          for ch in chars:
                              if ch in content:
                                  print(f'MOJIBAKE: {rp} contains U+{ord(ch):04X}')
                                  hits += 1
                                  break
                      except Exception:
                          pass
          if hits:
              print(f'FAIL: {hits} files with mojibake detected')
              sys.exit(1)
          print('PASS: no mojibake detected')
          "

  # ═══════════════════════════════════════════════════════════
  # Self-Heal — auto-detect + auto-fix common issues
  # ═══════════════════════════════════════════════════════════
  self-heal:
    name: Self-Heal (audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: CRUX Self-Heal audit
        run: python core/self_heal.py --json | tee health.json
      - name: Auto-fix silent exceptions
        run: python core/self_heal.py --fix
      - name: Create auto-fix PR if changes detected
        if: success()
        run: |
          if ! git diff --quiet; then
            git config user.name "CRUX Self-Healer"
            git config user.email "self-heal@crux.local"
            git checkout -b auto-fix/self-heal-$(date +%Y%m%d-%H%M)
            git add -A
            git commit -m "fix: auto-repair — silent exception logging"
            git push origin auto-fix/self-heal-$(date +%Y%m%d-%H%M) || true
          fi
