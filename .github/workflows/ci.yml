name: CRUX CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  RUFF_EXCLUDE: "_archive,node_modules,.git,.crux,stub_modules,_temp"

jobs:
  quality:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff pyright -r requirements.txt
      - name: Ruff lint
        run: ruff check --output-format=github . --exclude ${{ env.RUFF_EXCLUDE }}
      - name: Ruff format check
        run: ruff format --check . --exclude ${{ env.RUFF_EXCLUDE }}
      - name: Pyright type check (core only)
        run: pyright core/ || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run basic tests
        run: |
          python -m pytest tests/ -v --tb=short -q --ignore=tests/test_agent_mode.py -x --timeout=30 2>&1 || true
      - name: Coverage (core only)
        run: |
          python -m pytest tests/ --cov=core --cov-report=term --cov-report=xml --tb=short -q -x --timeout=30 2>&1 || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Bandit security check
        run: bandit -r core/ tools/ -f json -o bandit_report.json --skip B101,B311 || true
