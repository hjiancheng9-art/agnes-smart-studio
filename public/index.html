<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>新烬龙V2 · 驾驶舱</title>
<style>
:root{--bg:#070b14;--srf:#0d1425;--crd:#111a30;--brd:#1a2d4a;--t1:#e8edf5;--t2:#8899bb;--t3:#556688;--acc:#ff5e3a;--acc2:#ff8c42;--grn:#2ecc71;--yel:#f1c40f;--red:#e74c3c;--pip1:#3498db;--pip3:#e67e22;--grad:linear-gradient(135deg,var(--acc),var(--acc2));--shd:0 4px 24px rgba(0,0,0,.4);--rad:10px;--rads:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:48px;background:var(--srf);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
#topbar .logo{display:flex;align-items:center;gap:10px}
#topbar .logo .icon{font-size:22px}
#topbar .logo h1{font-size:16px;font-weight:700}
#topbar .logo .ver{font-size:11px;color:var(--t3);margin-left:4px}
#topbar .sep{flex:1}
#topbar .stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2)}
#topbar .stat .dot{width:8px;height:8px;border-radius:50%;background:var(--grn)}
#topbar .stat .dot.dead{background:var(--red)}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:260px;background:var(--srf);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0}
#sidebar .sh{padding:16px;border-bottom:1px solid var(--brd)}
#sidebar .sh button{width:100%;padding:10px;border:none;border-radius:var(--rads);background:var(--grad);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
#sidebar .sh button:hover{opacity:.9}
#sidebar .sl{flex:1;overflow-y:auto;padding:8px}
#sidebar .pj{padding:12px;border-radius:var(--rads);cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:.15s}
#sidebar .pj:hover{background:var(--crd)}
#sidebar .pj.act{background:var(--crd);border-color:var(--acc)}
#sidebar .pj .pn{font-size:13px;font-weight:600;margin-bottom:4px}
#sidebar .pj .pm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3)}
.sbdg{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase}
.sbdg.draft{background:rgba(136,153,187,.15);color:var(--t2)}
.sbdg.planning{background:rgba(52,152,219,.15);color:var(--pip1)}
.sbdg.producing{background:rgba(230,126,34,.15);color:var(--pip3)}
.sbdg.done{background:rgba(46,204,113,.15);color:var(--grn)}
#sidebar .sf{padding:12px 16px;border-top:1px solid var(--brd);font-size:11px;color:var(--t3);text-align:center}
#content{flex:1;overflow-y:auto;padding:24px 28px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--t3)}
.empty .ic{font-size:48px;opacity:.4}
.empty h3{font-size:18px;color:var(--t2)}
.empty p{font-size:13px;max-width:320px;text-align:center;line-height:1.6}
.pv{display:flex;align-items:center;margin-bottom:24px;gap:0;flex-wrap:nowrap;overflow-x:auto}
.pv .ps{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--crd);border-radius:var(--rads);border:1px solid var(--brd);font-size:13px;color:var(--t3);flex-shrink:0}
.pv .ps .pn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--brd)}
.pv .ps.ok{border-color:var(--grn);color:var(--t1)}
.pv .ps.ok .pn{background:var(--grn);color:#fff}
.pv .ps.cur{border-color:var(--acc);color:var(--t1);box-shadow:0 0 12px rgba(255,94,58,.15)}
.pv .ps.cur .pn{background:var(--grad);color:#fff}
.pv .cn{width:32px;height:2px;background:var(--brd);flex-shrink:0}
.pv .cn.ok{background:var(--grn)}
.dc{background:var(--crd);border:1px solid var(--brd);border-radius:var(--rad);padding:20px;margin-bottom:16px}
.dc .rw{display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap}
.dc .rw .fd{flex:1;min-width:140px}
.dc .rw .fd .lb{font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.dc .rw .fd .vl{font-size:13px;color:var(--t1);word-break:break-all}
.dc .tb{margin-bottom:12px}
.dc .tb .lb{font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.dc .tb .vl{font-size:13px;color:var(--t1);line-height:1.6;white-space:pre-wrap}
.ib{background:var(--crd);border:1px solid var(--brd);border-radius:var(--rad);padding:16px;margin-bottom:14px}
.ib .ih{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ib .ih .it{font-size:13px;font-weight:600}
.ib .ih .is{font-size:11px;color:var(--t3)}
.ib textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--rads);color:var(--t1);font-size:13px;outline:none;font-family:inherit;resize:vertical;min-height:60px}
.ib textarea:focus{border-color:var(--acc)}
.ib .ab{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.ib .ab button{padding:7px 16px;border-radius:var(--rads);font-size:12px;font-weight:600;cursor:pointer;border:none}
.ib .ab .bp{background:var(--grad);color:#fff}
.ib .ab .bp:hover{opacity:.85}
.ib .ab .bs{background:var(--brd);color:var(--t2)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.sc{background:var(--crd);border:1px solid var(--brd);border-radius:var(--rad);overflow:hidden}
.sc:hover{border-color:var(--acc)}
.sc .sp{height:160px;background:var(--srf);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--t3);position:relative;overflow:hidden}
.sc .sp img,.sc .sp video{width:100%;height:100%;object-fit:cover}
.sc .sp .bdg{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.sc .sp .bdg.pending{background:rgba(241,196,15,.15);color:var(--yel)}
.sc .sp .bdg.done{background:rgba(46,204,113,.15);color:var(--grn)}
.sc .si{padding:14px}
.sc .si .stl{font-size:13px;font-weight:600;margin-bottom:6px}
.sc .si .sd{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.sc .si .sf{display:flex;flex-direction:column;gap:8px}
.sc .si .sf .sw{display:flex;gap:6px;align-items:center}
.sc .si .sf .sw input{flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:4px;color:var(--t1);font-size:12px;outline:none}
.sc .si .sf .sw input:focus{border-color:var(--acc)}
.sc .si .sf .sw button{padding:6px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--grad);color:#fff;white-space:nowrap}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo .md{background:var(--srf);border:1px solid var(--brd);border-radius:var(--rad);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mo .md h2{font-size:18px;margin-bottom:20px}
.mo .md .fg{margin-bottom:16px}
.mo .md .fg label{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;font-weight:600}
.mo .md .fg input,.mo .md .fg textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--rads);color:var(--t1);font-size:13px;outline:none;font-family:inherit}
.mo .md .fg input:focus,.mo .md .fg textarea:focus{border-color:var(--acc)}
.mo .md .fg textarea{resize:vertical;min-height:80px}
.mo .md .ax{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.mo .md .ax button{padding:9px 20px;border-radius:var(--rads);font-size:13px;font-weight:600;cursor:pointer;border:none}
.mo .md .ax .bc{background:var(--crd);color:var(--t2)}
.mo .md .ax .bo{background:var(--grad);color:#fff}
.mo .md .ax button:hover{opacity:.85}
#toast{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;border-radius:var(--rads);font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{background:var(--grn);color:#fff}
#toast.err{background:var(--red);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
@media(max-width:768px){#sidebar{width:200px}#content{padding:16px}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><span class="icon">🔥</span><h1>新烬龙<span class="ver">V2</span></h1></div>
  <div class="sep"></div>
  <div class="stat"><span class="dot" id="sDot"></span><span id="sTxt">连接中...</span></div>
  <div class="stat" id="sUptime"></div>
  <div class="stat" id="sProjects"></div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="sh"><button id="btnNew">＋ 新建项目</button></div>
    <div class="sl" id="pjList"></div>
    <div class="sf">新烬龙V2 · 驾驶舱 v3.0</div>
  </div>
  <div id="content">
    <div class="empty">
      <span class="ic">🔥</span>
      <h3>选择一个项目</h3>
      <p>从左侧选择项目，或点击"新建项目"开始生产 AI 视频</p>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modalBox" style="display:none"></div>

<script>
'use strict';

// API
async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch('/api' + path, opts);
  return r.json();
}

// Status
function fmtTime(s) {
  if (s > 3600) return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
  if (s > 60) return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
  return Math.floor(s)+'s';
}

async function checkStatus() {
  try {
    var s = await api('GET', '/status');
    document.getElementById('sDot').className = 'dot';
    document.getElementById('sTxt').textContent = '在线';
    document.getElementById('sUptime').textContent = '⏱ ' + fmtTime(s.uptime);
    document.getElementById('sProjects').textContent = '📁 ' + s.projects + ' 项';
    return true;
  } catch(e) {
    document.getElementById('sDot').className = 'dot dead';
    document.getElementById('sTxt').textContent = '离线';
    return false;
  }
}

// Projects
var projects = [];
var activeId = null;

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); }

async function loadProjects() {
  try {
    var d = await api('GET', '/projects');
    projects = d.projects || [];
  } catch(e) {
    projects = [];
  }
  var el = document.getElementById('pjList');
  if (projects.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:13px;">暂无项目</div>';
  } else {
    el.innerHTML = projects.map(function(p) {
      return '<div class="pj ' + (p.id === activeId ? 'act' : '') + '" onclick="selectProject(\'' + p.id + '\')">' +
        '<div class="pn">' + esc(p.name) + '</div>' +
        '<div class="pm"><span class="sbdg ' + p.status + '">' + p.status + '</span><span>' + fmtDate(p.updated) + '</span></div>' +
        '</div>';
    }).join('');
  }
}

// Select project
async function selectProject(id) {
  activeId = id;
  loadProjects();
  try {
    var d = await api('GET', '/projects/' + id);
    if (d.error) { toast('加载失败', 'err'); return; }
    renderDetail(d);
  } catch(e) {
    toast('加载失败: ' + e.message, 'err');
  }
}

function renderDetail(d) {
  var pipe = d.pipeline || {};
  var shots = pipe.shots || [];
  var stage = pipe.stage || 'intent';
  var stages = ['intent', 'brief', 'storyboard', 'visual', 'done'];
  var names = ['意图', '简报', '分镜', '画面', '完成'];
  var si = stages.indexOf(stage);
  if (si < 0) si = 0;

  // Pipeline visual
  var pipeHtml = '';
  for (var i = 0; i < stages.length; i++) {
    if (i > 0) pipeHtml += '<div class="cn ' + (i <= si ? 'ok' : '') + '"></div>';
    pipeHtml += '<div class="ps ' + (i < si ? 'ok' : '') + (i === si ? ' cur' : '') + '">' +
      '<span class="pn">' + (i < si ? '✓' : (i + 1)) + '</span><span>' + names[i] + '</span></div>';
  }

  // Input blocks
  var inp = '';
  inp += '<div class="ib"><div class="ih"><span class="it">🎯 设定意图</span></div>' +
    '<textarea id="inpIntent" rows="2" placeholder="例：30秒赛博朋克城市宣传片...">' + esc(pipe.intent || '') + '</textarea>' +
    '<div class="ab"><button class="bp" onclick="doIntent(\'' + d.id + '\')">提交意图</button></div></div>';

  inp += '<div class="ib"><div class="ih"><span class="it">📝 设定简报</span></div>' +
    '<textarea id="inpBrief" rows="3" placeholder="风格、色调、受众...">' + esc(pipe.brief || '') + '</textarea>' +
    '<div class="ab"><button class="bp" onclick="doBrief(\'' + d.id + '\')">提交简报</button></div></div>';

  var sbText = '';
  if (Array.isArray(pipe.storyboard)) {
    sbText = pipe.storyboard.map(function(s) { return s.description || s; }).join('\n');
  } else {
    sbText = pipe.storyboard || '';
  }
  inp += '<div class="ib"><div class="ih"><span class="it">🎬 设定分镜</span><span class="is">(' + shots.length + ' 个镜头)</span></div>' +
    '<textarea id="inpSB" rows="4" placeholder="每行一个镜头">' + esc(sbText) + '</textarea>' +
    '<div class="ab"><button class="bp" onclick="doSB(\'' + d.id + '\')">提交分镜</button></div></div>';

  // Detail card
  var detail = '<div class="dc"><div class="rw">' +
    '<div class="fd"><div class="lb">名称</div><div class="vl">' + esc(d.name) + '</div></div>' +
    '<div class="fd"><div class="lb">状态</div><div class="vl"><span class="sbdg ' + d.status + '">' + d.status + '</span></div></div>' +
    '<div class="fd"><div class="lb">创建</div><div class="vl">' + fmtDate(d.created) + '</div></div>' +
    '</div>' + (d.description ? '<div class="tb"><div class="lb">描述</div><div class="vl">' + esc(d.description) + '</div></div>' : '') + '</div>';

  // Shots
  var shotHtml = '';
  if (shots.length > 0) {
    shotHtml = '<div style="margin-bottom:24px"><div style="font-size:14px;font-weight:600;color:var(--t2);margin-bottom:12px;">🎬 镜头 (' + shots.length + ')</div><div class="sg">';
    for (var i = 0; i < shots.length; i++) {
      var s = shots[i];
      shotHtml += '<div class="sc">' +
        '<div class="sp">' + (s.imageUrl ? '<img src="' + esc(s.imageUrl) + '" onerror="this.style.display=\'none\'" loading="lazy">' : '') +
        (s.videoUrl ? '<video src="' + esc(s.videoUrl) + '" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>' : '') +
        (!s.imageUrl && !s.videoUrl ? '🎞️' : '') +
        '<span class="bdg ' + s.status + '">' + s.status + '</span></div>' +
        '<div class="si"><div class="stl">镜头 ' + (i + 1) + '</div>' +
        '<div class="sd">' + esc(s.description || '—') + '</div>' +
        '<div class="sf">' +
        '<div class="sw"><span style="font-size:11px;color:var(--t3);flex-shrink:0;">🖼</span><input id="si-' + i + '" placeholder="图片 URL..." value="' + esc(s.imageUrl || '') + '"><button onclick="doShotImg(\'' + d.id + '\',' + i + ')">设置</button></div>' +
        '<div class="sw"><span style="font-size:11px;color:var(--t3);flex-shrink:0;">🎥</span><input id="sv-' + i + '" placeholder="视频 URL..." value="' + esc(s.videoUrl || '') + '"><button onclick="doShotVid(\'' + d.id + '\',' + i + ')">设置</button></div>' +
        '</div></div></div>';
    }
    shotHtml += '</div></div>';
  }

  // Actions
  var actions = '<div style="display:flex;gap:8px;margin-top:16px;">' +
    '<button onclick="delProject(\'' + d.id + '\')" style="padding:8px 16px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:var(--rads);cursor:pointer;font-size:12px;font-weight:600;">🗑 删除</button>' +
    '<button onclick="selectProject(\'' + d.id + '\')" style="padding:8px 16px;background:transparent;border:1px solid var(--t3);color:var(--t2);border-radius:var(--rads);cursor:pointer;font-size:12px;font-weight:600;">🔄 刷新</button></div>';

  document.getElementById('content').innerHTML = '<div class="pv">' + pipeHtml + '</div>' + detail + inp + shotHtml + actions;
}

// Pipeline actions
async function doIntent(id) {
  var v = document.getElementById('inpIntent').value.trim();
  if (!v) { toast('请输入意图', 'err'); return; }
  var r = await api('POST', '/projects/' + id + '/pipeline', { action: 'set_intent', intent: v });
  if (r.error) { toast('提交失败', 'err'); return; }
  toast('意图已设定', 'ok');
  selectProject(id);
}

async function doBrief(id) {
  var v = document.getElementById('inpBrief').value.trim();
  if (!v) { toast('请输入简报', 'err'); return; }
  var r = await api('POST', '/projects/' + id + '/pipeline', { action: 'set_brief', brief: v });
  if (r.error) { toast('提交失败', 'err'); return; }
  toast('简报已设定', 'ok');
  selectProject(id);
}

async function doSB(id) {
  var v = document.getElementById('inpSB').value.trim();
  if (!v) { toast('请输入分镜', 'err'); return; }
  var r = await api('POST', '/projects/' + id + '/pipeline', { action: 'set_storyboard', storyboard: v });
  if (r.error) { toast('提交失败', 'err'); return; }
  toast('分镜已设定', 'ok');
  selectProject(id);
}

async function doShotImg(id, idx) {
  var v = document.getElementById('si-' + idx).value.trim();
  if (!v) { toast('请输入图片 URL', 'err'); return; }
  var r = await api('POST', '/projects/' + id + '/pipeline', { action: 'set_shot_image', shotIndex: idx, imageUrl: v });
  if (r.error) { toast('设置失败', 'err'); return; }
  toast('镜头 ' + (idx+1) + ' 图片已设置', 'ok');
  selectProject(id);
}

async function doShotVid(id, idx) {
  var v = document.getElementById('sv-' + idx).value.trim();
  if (!v) { toast('请输入视频 URL', 'err'); return; }
  var r = await api('POST', '/projects/' + id + '/pipeline', { action: 'set_shot_video', shotIndex: idx, videoUrl: v });
  if (r.error) { toast('设置失败', 'err'); return; }
  toast('镜头 ' + (idx+1) + ' 视频已设置', 'ok');
  selectProject(id);
}

// Modal
function showModal() {
  var box = document.getElementById('modalBox');
  box.style.display = 'flex';
  box.innerHTML = '<div class="mo" onclick="if(event.target===this)hideModal()">' +
    '<div class="md"><h2>🔥 新建项目</h2>' +
    '<div class="fg"><label>项目名称</label><input id="nName" placeholder="输入项目名称..." autofocus></div>' +
    '<div class="fg"><label>描述（可选）</label><textarea id="nDesc" placeholder="简要描述..."></textarea></div>' +
    '<div class="ax"><button class="bc" onclick="hideModal()">取消</button><button class="bo" onclick="createProject()">创建项目</button></div></div></div>';
  setTimeout(function() { var el = document.getElementById('nName'); if (el) el.focus(); }, 100);
}

function hideModal() {
  document.getElementById('modalBox').style.display = 'none';
  document.getElementById('modalBox').innerHTML = '';
}

async function createProject() {
  var n = document.getElementById('nName').value.trim();
  if (!n) { toast('请输入项目名称', 'err'); return; }
  var d = document.getElementById('nDesc').value.trim();
  var r = await api('POST', '/projects', { name: n, description: d });
  if (r.error) { toast('创建失败', 'err'); return; }
  hideModal();
  toast('项目已创建', 'ok');
  await loadProjects();
  selectProject(r.id);
}

async function delProject(id) {
  if (!confirm('确定删除？不可恢复。')) return;
  await api('DELETE', '/projects/' + id);
  toast('已删除', 'ok');
  activeId = null;
  document.getElementById('content').innerHTML = '<div class="empty"><span class="ic">🔥</span><h3>选择一个项目</h3><p>从左侧选择项目查看详情</p></div>';
  loadProjects();
}

// Toast
function toast(msg, type) {
  if (!type) type = 'ok';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.className = ''; }, 2500);
}

// Init
document.addEventListener('DOMContentLoaded', function() {
  checkStatus();
  loadProjects();
  setInterval(checkStatus, 10000);

  document.getElementById('btnNew').addEventListener('click', showModal);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideModal();
    if (e.key === 'n' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); showModal(); }
  });

  // Auto-select first project after load
  var checkLoaded = setInterval(function() {
    if (projects.length > 0 && !activeId) {
      selectProject(projects[0].id);
      clearInterval(checkLoaded);
    }
  }, 500);
});
</script>
</body>
</html>
