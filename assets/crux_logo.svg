    <rect x="24" y="64" width="8" height="8" fill="#5BA3CF"/>
    <rect x="72" y="64" width="8" height="8" fill="#5BA3CF"/>
    <!-- Bottom shoulders -->
    <rect x="32" y="72" width="8" height="8" fill="#5BA3CF"/>
    <rect x="40" y="72" width="8" height="8" fill="#5BA3CF"/>
    <rect x="56" y="72" width="8" height="8" fill="#5BA3CF"/>
    <rect x="64" y="72" width="8" height="8" fill="#5BA3CF"/>
    <rect x="24" y="72" width="8" height="8" fill="#5BA3CF"/>
