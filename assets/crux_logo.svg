  <!-- Brand text -->
  <text x="130" y="52" font-family="Consolas, Courier New, monospace" font-size="28" font-weight="bold" fill="#5BA3CF" letter-spacing="3">CRUX</text>
  <text x="130" y="78" font-family="Consolas, Courier New, monospace" font-size="14" fill="#5BA3CF" letter-spacing="1">Studio</text>
  <line x1="130" y1="94" x2="500" y2="94" stroke="#4a4a4a" stroke-width="1"/>
  <text x="130" y="112" font-family="Consolas, Courier New, monospace" font-size="11" fill="#4a4a4a">AI-native creative platform</text>
  <line x1="16" y1="168" x2="504" y2="168" stroke="#4a4a4a" stroke-width="1" opacity="0.3"/>
  <text x="16" y="160" font-family="Consolas, Courier New, monospace" font-size="10" fill="#4a4a4a">v5.0  ·  52 tools  ·  45 skills  ·  Codex parity</text>
</svg>