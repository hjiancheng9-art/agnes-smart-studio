<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <rect width="520" height="180" fill="#0a0a0a"/>
  <!-- Convergence diamond symbol -->
  <g transform="translate(16, 20)">
    <!-- Top apex -->
    <rect x="40" y="0" width="8" height="8" fill="#5BA3CF"/>
    <rect x="48" y="0" width="8" height="8" fill="#5BA3CF"/>
    <!-- Top shoulders -->
    <rect x="32" y="8" width="8" height="8" fill="#5BA3CF"/>
    <rect x="56" y="8" width="8" height="8" fill="#5BA3CF"/>
    <rect x="64" y="8" width="8" height="8" fill="#5BA3CF"/>
    <rect x="24" y="8" width="8" height="8" fill="#5BA3CF"/>
    <!-- Spreading -->
    <rect x="24" y="16" width="8" height="8" fill="#5BA3CF"/>
    <rect x="72" y="16" width="8" height="8" fill="#5BA3CF"/>
    <!-- Accent ring top -->
    <rect x="16" y="24" width="8" height="8" fill="#C084FC"/>
    <rect x="24" y="24" width="8" height="8" fill="#C084FC"/>
    <rect x="64" y="24" width="8" height="8" fill="#C084FC"/>
    <rect x="72" y="24" width="8" height="8" fill="#C084FC"/>
    <rect x="80" y="24" width="8" height="8" fill="#5BA3CF"/>
