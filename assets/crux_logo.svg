    <rect x="72" y="40" width="8" height="8" fill="#C084FC"/>
    <rect x="80" y="40" width="8" height="8" fill="#5BA3CF"/>
    <!-- Convergence mirror -->
    <rect x="8" y="48" width="8" height="8" fill="#5BA3CF"/>
    <rect x="16" y="48" width="8" height="8" fill="#C084FC"/>
    <rect x="24" y="48" width="8" height="8" fill="#C084FC"/>
    <rect x="40" y="48" width="8" height="8" fill="#7BC47F"/>
    <rect x="56" y="48" width="8" height="8" fill="#7BC47F"/>
    <rect x="64" y="48" width="8" height="8" fill="#C084FC"/>
    <rect x="72" y="48" width="8" height="8" fill="#C084FC"/>
    <rect x="80" y="48" width="8" height="8" fill="#5BA3CF"/>
    <!-- Accent ring bottom -->
    <rect x="16" y="56" width="8" height="8" fill="#C084FC"/>
    <rect x="24" y="56" width="8" height="8" fill="#C084FC"/>
    <rect x="64" y="56" width="8" height="8" fill="#C084FC"/>
    <rect x="72" y="56" width="8" height="8" fill="#C084FC"/>
    <rect x="80" y="56" width="8" height="8" fill="#5BA3CF"/>
    <rect x="8" y="56" width="8" height="8" fill="#5BA3CF"/>
