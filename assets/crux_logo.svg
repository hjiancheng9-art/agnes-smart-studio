    <!-- Convergence rows with green -->
    <rect x="8" y="32" width="8" height="8" fill="#5BA3CF"/>
    <rect x="16" y="32" width="8" height="8" fill="#C084FC"/>
    <rect x="24" y="32" width="8" height="8" fill="#C084FC"/>
    <rect x="40" y="32" width="8" height="8" fill="#7BC47F"/>
    <rect x="56" y="32" width="8" height="8" fill="#7BC47F"/>
    <rect x="64" y="32" width="8" height="8" fill="#C084FC"/>
    <rect x="72" y="32" width="8" height="8" fill="#C084FC"/>
    <rect x="80" y="32" width="8" height="8" fill="#5BA3CF"/>
    <!-- WHITE CORE row -->
    <rect x="8" y="40" width="8" height="8" fill="#5BA3CF"/>
    <rect x="16" y="40" width="8" height="8" fill="#C084FC"/>
    <rect x="32" y="40" width="8" height="8" fill="#7BC47F"/>
