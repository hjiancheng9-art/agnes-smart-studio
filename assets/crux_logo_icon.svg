<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0a0a0a"/>
  <!-- Convergence diamond icon -->
  <g transform="translate(4, 2)">
    <!-- Top apex -->
    <rect x="24" y="0" width="4" height="4" fill="#5BA3CF"/>
    <rect x="28" y="0" width="4" height="4" fill="#5BA3CF"/>
    <!-- Top shoulders -->
    <rect x="20" y="4" width="4" height="4" fill="#5BA3CF"/>
    <rect x="28" y="4" width="4" height="4" fill="#5BA3CF"/>
    <rect x="32" y="4" width="4" height="4" fill="#5BA3CF"/>
    <rect x="16" y="4" width="4" height="4" fill="#5BA3CF"/>
    <!-- Spreading -->
    <rect x="12" y="8" width="4" height="4" fill="#5BA3CF"/>
    <rect x="36" y="8" width="4" height="4" fill="#5BA3CF"/>
    <!-- Accent ring top -->
    <rect x="8" y="12" width="4" height="4" fill="#C084FC"/>
    <rect x="12" y="12" width="4" height="4" fill="#C084FC"/>
    <rect x="32" y="12" width="4" height="4" fill="#C084FC"/>
    <rect x="36" y="12" width="4" height="4" fill="#C084FC"/>
    <!-- Convergence with green -->
    <rect x="4" y="16" width="4" height="4" fill="#5BA3CF"/>
    <rect x="8" y="16" width="4" height="4" fill="#C084FC"/>
    <rect x="12" y="16" width="4" height="4" fill="#C084FC"/>
    <rect x="24" y="16" width="4" height="4" fill="#7BC47F"/>
    <rect x="28" y="16" width="4" height="4" fill="#7BC47F"/>
    <rect x="32" y="16" width="4" height="4" fill="#C084FC"/>
    <rect x="36" y="16" width="4" height="4" fill="#C084FC"/>
    <rect x="40" y="16" width="4" height="4" fill="#5BA3CF"/>
    <!-- WHITE CORE -->
    <rect x="4" y="20" width="4" height="4" fill="#5BA3CF"/>
    <rect x="8" y="20" width="4" height="4" fill="#C084FC"/>
    <rect x="20" y="20" width="4" height="4" fill="#7BC47F"/>
    <rect x="24" y="20" width="4" height="4" fill="#FFFFFF"/>
    <rect x="28" y="20" width="4" height="4" fill="#7BC47F"/>
    <rect x="36" y="20" width="4" height="4" fill="#C084FC"/>
    <rect x="40" y="20" width="4" height="4" fill="#5BA3CF"/>
    <!-- Convergence mirror -->
    <rect x="4" y="24" width="4" height="4" fill="#5BA3CF"/>
    <rect x="8" y="24" width="4" height="4" fill="#C084FC"/>
    <rect x="12" y="24" width="4" height="4" fill="#C084FC"/>
    <rect x="24" y="24" width="4" height="4" fill="#7BC47F"/>
    <rect x="28" y="24" width="4" height="4" fill="#7BC47F"/>
    <rect x="32" y="24" width="4" height="4" fill="#C084FC"/>
    <rect x="36" y="24" width="4" height="4" fill="#C084FC"/>
    <rect x="40" y="24" width="4" height="4" fill="#5BA3CF"/>
    <!-- Accent ring bottom -->
    <rect x="8" y="28" width="4" height="4" fill="#C084FC"/>
    <rect x="12" y="28" width="4" height="4" fill="#C084FC"/>
    <rect x="32" y="28" width="4" height="4" fill="#C084FC"/>
    <rect x="36" y="28" width="4" height="4" fill="#C084FC"/>
    <!-- Narrowing -->
    <rect x="12" y="32" width="4" height="4" fill="#5BA3CF"/>
    <rect x="36" y="32" width="4" height="4" fill="#5BA3CF"/>
    <!-- Bottom shoulders -->
    <rect x="16" y="36" width="4" height="4" fill="#5BA3CF"/>
    <rect x="20" y="36" width="4" height="4" fill="#5BA3CF"/>
    <rect x="28" y="36" width="4" height="4" fill="#5BA3CF"/>
    <rect x="32" y="36" width="4" height="4" fill="#5BA3CF"/>
    <!-- Bottom apex -->
    <rect x="24" y="40" width="4" height="4" fill="#5BA3CF"/>
    <rect x="28" y="40" width="4" height="4" fill="#5BA3CF"/>
  </g>
</svg>